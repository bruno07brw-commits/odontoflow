{% extends "base.html" %}
{% block title %}Agendar - OdontoFlow{% endblock %}
{% block extra_css %}
<style>
.pagina{max-width:680px;margin:2.5rem auto;padding:0 1.5rem;}
.pagina h1{font-size:1.8rem;margin-bottom:0.4rem;}
.subtitulo{font-size:0.9rem;color:var(--muted);margin-bottom:2rem;}
.procedimentos{display:grid;gap:1rem;margin-bottom:2rem;}
.proc-card{background:var(--branco);border:2px solid var(--cinza-borda);border-radius:var(--radius);padding:1.25rem 1.5rem;cursor:pointer;display:flex;align-items:flex-start;gap:1rem;transition:border-color 0.2s,transform 0.15s;}
.proc-card:hover{border-color:var(--azul);transform:translateY(-2px);}
.proc-card.selecionado{border-color:var(--azul);background:var(--azul-claro);}
.proc-card input{display:none;}
.proc-icone{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.azul{background:var(--azul-claro);}.verde{background:var(--verde-claro);}.laranja{background:var(--laranja-claro);}
.proc-nome{font-size:1rem;font-weight:500;margin-bottom:0.25rem;}
.proc-desc{font-size:0.85rem;color:var(--muted);margin-bottom:0.6rem;}
.proc-tempo{display:inline-flex;font-size:0.82rem;font-weight:500;padding:3px 10px;border-radius:20px;}
.tempo-azul{background:var(--azul-claro);color:var(--azul);}
.tempo-verde{background:var(--verde-claro);color:var(--verde);}
.tempo-laranja{background:var(--laranja-claro);color:var(--laranja);}
.aviso{border-radius:10px;padding:1rem;font-size:0.88rem;margin-bottom:1.5rem;display:none;line-height:1.6;}
.aviso.visivel{display:block;}
.secao{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:1.5rem;margin-bottom:1.25rem;}
.secao h2{font-size:1.1rem;margin-bottom:1.25rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
</style>
{% endblock %}
{% block content %}
<div class="pagina">
<h1 class="animar">Agendar consulta</h1>
<p class="subtitulo animar animar-2">Selecione o procedimento e veja o tempo estimado</p>
<form method="POST" action="{{ url_for('agendar') }}">
<div class="procedimentos animar animar-2">
<label class="proc-card" id="card-canal" onclick="sel('canal')">
<input type="radio" name="procedimento" value="canal" required>
<div class="proc-icone azul">🦷</div>
<div><p class="proc-nome">Tratamento de Canal</p><p class="proc-desc">Remoção da polpa infectada e selagem do dente.</p><span class="proc-tempo tempo-azul">⏱ 90-120 min</span></div>
</label>
<label class="proc-card" id="card-aparelho" onclick="sel('aparelho')">
<input type="radio" name="procedimento" value="aparelho" required>
<div class="proc-icone verde">😁</div>
<div><p class="proc-nome">Manutenção do Aparelho</p><p class="proc-desc">Troca de borrachinhas e ajuste de fios.</p><span class="proc-tempo tempo-verde">⏱ 30-45 min</span></div>
</label>
<label class="proc-card" id="card-extracao" onclick="sel('extracao')">
<input type="radio" name="procedimento" value="extracao" required>
<div class="proc-icone laranja">🩺</div>
<div><p class="proc-nome">Extração de Dente</p><p class="proc-desc">Retirada do dente com anestesia local.</p><span class="proc-tempo tempo-laranja">⏱ 45-60 min</span></div>
</label>
</div>
<div class="aviso" id="aviso"></div>
<div class="secao"><h2>Data e horário</h2>
<div class="grid2">
<div><label>Data</label><input type="date" name="data" required min="{{ hoje }}"></div>
<div><label>Horário</label><select name="hora" required><option value="" disabled selected>Escolha</option><option>08:00</option><option>09:00</option><option>10:00</option><option>11:00</option><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option></select></div>
</div></div>
<button type="submit" class="btn btn-primary">Confirmar agendamento</button>
</form>
</div>
{% endblock %}
{% block extra_js %}
<script>
var av={
  canal:{bg:'var(--azul-claro)',bo:'#bfdbfe',co:'var(--azul)',tx:'<strong>Canal</strong> — 90 a 120 min por sessão.'},
  aparelho:{bg:'var(--verde-claro)',bo:'#6ee7b7',co:'var(--verde)',tx:'<strong>Aparelho</strong> — 30 a 45 min.'},
  extracao:{bg:'var(--laranja-claro)',bo:'#fcd34d',co:'var(--laranja)',tx:'<strong>Extração</strong> — 45 a 60 min.'}
};
function sel(v){
  document.querySelectorAll('.proc-card').forEach(function(c){c.classList.remove('selecionado')});
  document.getElementById('card-'+v).classList.add('selecionado');
  var e=document.getElementById('aviso'),a=av[v];
  e.className='aviso visivel';
  e.style.background=a.bg;
  e.style.border='1px solid '+a.bo;
  e.style.color=a.co;
  e.innerHTML='📋 '+a.tx;
}
</script>
{% endblock %}
